name: AI Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-human-review:
    runs-on: ubuntu-latest
    name: Verify Human Review on AI Code
    steps:
      - uses: actions/checkout@v4

      - name: Check AI traceability tags
        run: python scripts/check_ai_traceability.py

      - name: Block merge without human-reviewed tag
        run: |
          if grep -r "ai-generated" --include="*.java" . | grep -v "human-reviewed: yes"; then
            echo "❌ Found AI-generated code without human-reviewed: yes tag"
            exit 1
          fi
          echo "✅ All AI-generated code has been human-reviewed"
