repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: validate-frontmatter
        name: Validate Markdown Frontmatter
        entry: python scripts/validate_frontmatter.py
        language: python
        files: \.md$

      - id: check-ai-traceability
        name: Check AI Traceability Tags
        entry: python scripts/check_ai_traceability.py
        language: python
        files: \.java$
