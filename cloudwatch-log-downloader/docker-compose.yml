version: '3.8'

services:
  cloudwatch-downloader:
    build: .
    container_name: cloudwatch-log-downloader
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./config.prod.json:/app/config.prod.json:ro
      - ~/.aws:/home/node/.aws:ro
    environment:
      - NODE_ENV=production
      - CONFIG_ENV=prod
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  logs:
    driver: local
